<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化图表 - 宠物图像识别系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    {% load static %}
    <script src="{% static 'js/charts.js' %}"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">宠物识别系统</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">首页</a>
                <a class="nav-link active" href="{% url 'charts' %}">图表</a>
                <a class="nav-link" href="{% url 'profile' %}">个人中心</a>
                <a class="nav-link" href="{% url 'logout' %}">登出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="text-center mb-4">模型性能可视化</h2>

        <!-- 双Tab页结构 -->
        <ul class="nav nav-tabs justify-content-center" id="chartTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="catdog-tab" data-bs-toggle="tab" data-bs-target="#catdog-charts" type="button" role="tab" aria-controls="catdog-charts" aria-selected="true">猫狗分类统计</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="breeds-tab" data-bs-toggle="tab" data-bs-target="#breeds-charts" type="button" role="tab" aria-controls="breeds-charts" aria-selected="false">狗品种识别统计</button>
            </li>
        </ul>

        <!-- 实时数据卡片区域 -->
        <div id="stats-cards" class="row mt-4 mb-4">
            <!-- 卡片内容由JavaScript动态生成 -->
        </div>

        <div class="tab-content" id="chartTabsContent">
            <!-- 猫狗分类统计Tab -->
            <div class="tab-pane fade show active" id="catdog-charts" role="tabpanel" aria-labelledby="catdog-tab">
                <!-- 模型性能对比 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>猫狗分类 - 模型性能对比</h4>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-md-4">
                                <div id="catdog-accuracyChart" style="width: 100%; height: 300px;"></div>
                            </div>
                            <div class="col-md-4">
                                <div id="catdog-timeChart" style="width: 100%; height: 300px;"></div>
                            </div>
                            <div class="col-md-4">
                                <div id="catdog-sizeChart" style="width: 100%; height: 300px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 置信度统计 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>猫狗分类 - 置信度统计</h4>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-12 mb-3">
                                <div id="catdog-confOverallChart" style="width: 100%; height: 360px;"></div>
                            </div>
                            <div class="col-12">
                                <div id="catdog-confClassChart" style="width: 100%; height: 420px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 狗品种识别统计Tab -->
            <div class="tab-pane fade" id="breeds-charts" role="tabpanel" aria-labelledby="breeds-tab">
                <!-- 模型性能对比 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>狗品种识别 - 模型性能对比</h4>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-md-4">
                                <div id="breeds-accuracyChart" style="width: 100%; height: 300px;"></div>
                            </div>
                            <div class="col-md-4">
                                <div id="breeds-timeChart" style="width: 100%; height: 300px;"></div>
                            </div>
                            <div class="col-md-4">
                                <div id="breeds-sizeChart" style="width: 100%; height: 300px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 置信度统计 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>狗品种识别 - 置信度统计</h4>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-12 mb-3">
                                <div id="breeds-confOverallChart" style="width: 100%; height: 360px;"></div>
                            </div>
                            <div class="col-12">
                                <!-- 排序和筛选控件 -->
                                <div class="row mb-3">
                                    <div class="col-md-3">
                                        <label for="breed-sort-select" class="form-label">排序方式</label>
                                        <select class="form-select" id="breed-sort-select">
                                            <option value="average" selected>按平均准确率排序</option>
                                            <option value="resnet">按ResNet准确率排序</option>
                                            <option value="vgg">按VGG准确率排序</option>
                                            <option value="mobilenet">按MobileNet准确率排序</option>
                                        </select>
                                    </div>
                                    <div class="col-md-9">
                                        <label class="form-label">显示模型</label>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="checkbox" id="show-resnet" checked>
                                            <label class="form-check-label" for="show-resnet">ResNet</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="checkbox" id="show-vgg" checked>
                                            <label class="form-check-label" for="show-vgg">VGG</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="checkbox" id="show-mobilenet" checked>
                                            <label class="form-check-label" for="show-mobilenet">MobileNet</label>
                                        </div>
                                    </div>
                                </div>
                                <div id="breeds-confClassChart" style="width: 100%; height: 600px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 图表变量 - 猫狗分类
        let catdogAccuracyChart, catdogTimeChart, catdogSizeChart;
        let catdogConfOverallChart, catdogConfClassChart;

        // 图表变量 - 狗品种识别
        let breedsAccuracyChart, breedsTimeChart, breedsSizeChart;
        let breedsConfOverallChart, breedsConfClassChart;

        // 图表初始化状态
        let catdogChartsInitialized = false;
        let breedsChartsInitialized = false;

        // 当前活跃Tab
        let currentTab = 'catdog';

        // 存储原始数据用于排序筛选
        let breedsClassData = null;

        // 初始化猫狗分类图表
        function initCatdogCharts() {
            if (catdogChartsInitialized) return;

            catdogAccuracyChart = echarts.init(document.getElementById('catdog-accuracyChart'));
            catdogTimeChart = echarts.init(document.getElementById('catdog-timeChart'));
            catdogSizeChart = echarts.init(document.getElementById('catdog-sizeChart'));
            catdogConfOverallChart = echarts.init(document.getElementById('catdog-confOverallChart'));
            catdogConfClassChart = echarts.init(document.getElementById('catdog-confClassChart'));

            catdogChartsInitialized = true;
        }

        // 初始化狗品种识别图表
        function initBreedsCharts() {
            if (breedsChartsInitialized) return;

            breedsAccuracyChart = echarts.init(document.getElementById('breeds-accuracyChart'));
            breedsTimeChart = echarts.init(document.getElementById('breeds-timeChart'));
            breedsSizeChart = echarts.init(document.getElementById('breeds-sizeChart'));
            breedsConfOverallChart = echarts.init(document.getElementById('breeds-confOverallChart'));
            breedsConfClassChart = echarts.init(document.getElementById('breeds-confClassChart'));

            breedsChartsInitialized = true;
        }

        // 更新狗品种类别置信度图表（支持排序和筛选）
        function updateBreedsClassChart(classData, isCatdog) {
            const classChart = isCatdog ? catdogConfClassChart : breedsConfClassChart;
            const models = ['resnet', 'vgg', 'mobilenet'];
            const modelLabels = { 'resnet': 'ResNet', 'vgg': 'VGG', 'mobilenet': 'MobileNet' };

            let displayClasses = classData.classes;
            let displayData = classData;

            if (!isCatdog) {
                // 获取排序和筛选设置
                const sortBy = document.getElementById('breed-sort-select').value;
                const showResnet = document.getElementById('show-resnet').checked;
                const showVgg = document.getElementById('show-vgg').checked;
                const showMobilenet = document.getElementById('show-mobilenet').checked;

                // 排序品种
                const sortedIndices = displayClasses.map((cls, index) => {
                    let sortValue;
                    if (sortBy === 'average') {
                        const resnetVal = classData.resnet?.[cls] || 0;
                        const vggVal = classData.vgg?.[cls] || 0;
                        const mobilenetVal = classData.mobilenet?.[cls] || 0;
                        sortValue = (resnetVal + vggVal + mobilenetVal) / 3;
                    } else {
                        sortValue = classData[sortBy]?.[cls] || 0;
                    }
                    return { index, value: sortValue };
                }).sort((a, b) => b.value - a.value);

                displayClasses = sortedIndices.map(item => displayClasses[item.index]);
                displayClasses.reverse(); // 反转顺序，使高准确率显示在顶部

                // 动态调整图表高度
                const breedCount = displayClasses.length;
                const dynamicHeight = Math.max(400, breedCount * 40);
                document.getElementById('breeds-confClassChart').style.height = `${dynamicHeight}px`;
                breedsConfClassChart.resize();
            }

            // 生成系列数据
            const series = (isCatdog ? models : models.filter(m => {
                if (m === 'resnet') return document.getElementById('show-resnet').checked;
                if (m === 'vgg') return document.getElementById('show-vgg').checked;
                if (m === 'mobilenet') return document.getElementById('show-mobilenet').checked;
                return true;
            })).map(model => ({
                name: modelLabels[model],
                type: 'bar',
                data: displayClasses.map(cls => classData[model]?.[cls] || 0),
                itemStyle: {
                    color: model === 'resnet' ? '#5470c6' : model === 'vgg' ? '#91cc75' : '#fac858'
                }
            }));

            // 清除之前的图表内容
            classChart.clear();

            classChart.setOption({
                title: { text: `各类别识别准确率${isCatdog ? '（猫 vs 狗）' : '（三模型对比）'}` },
                tooltip: { trigger: 'axis' },
                legend: { data: series.map(s => s.name) },
                grid: { containLabel: true },
                xAxis: isCatdog ? {
                    type: 'category',
                    data: displayClasses,
                    axisLabel: { interval: 0 }
                } : {
                    type: 'value',
                    name: '准确率 (%)'
                },
                yAxis: isCatdog ? {
                    type: 'value',
                    name: '准确率 (%)'
                } : {
                    type: 'category',
                    data: displayClasses,
                    axisLabel: { interval: 0 }
                },
                series: series
            });

            // 强制重新调整图表尺寸
            if (!isCatdog) {
                breedsConfClassChart.resize();
            } else {
                catdogConfClassChart.resize();
            }
        }

        // 重新调整图表尺寸
        function resizeCharts(tab) {
            if (tab === 'catdog' && catdogChartsInitialized) {
                catdogAccuracyChart.resize();
                catdogTimeChart.resize();
                catdogSizeChart.resize();
                catdogConfOverallChart.resize();
                catdogConfClassChart.resize();
            } else if (tab === 'breeds' && breedsChartsInitialized) {
                breedsAccuracyChart.resize();
                breedsTimeChart.resize();
                breedsSizeChart.resize();
                breedsConfOverallChart.resize();
                breedsConfClassChart.resize();
            }
        }

        // 加载实时数据卡片
        function loadDailyStats(task) {
            const taskParam = task === 'catdog' ? 'catdog' : 'dogbreed';
            fetch(`/api/daily/stats/?task=${taskParam}`)
                .then(response => response.json())
                .then(data => {
                    updateStatsCards(task, data);
                })
                .catch(error => console.error('加载实时数据失败:', error));
        }

        // 更新统计卡片
        function updateStatsCards(task, data) {
            const cardsContainer = document.getElementById('stats-cards');
            let html = '';

            if (task === 'catdog') {
                // 猫狗分类卡片
                html = `
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.total_count}</h5>
                                <p class="card-text">今日总识别次数</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.resnet_count}</h5>
                                <p class="card-text">ResNet今日使用</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.vgg_count}</h5>
                                <p class="card-text">VGG今日使用</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.mobilenet_count}</h5>
                                <p class="card-text">MobileNet今日使用</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 mt-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <h6 class="card-title">猫狗比例</h6>
                                <div id="catdog-pie-chart" style="width: 100%; height: 300px; margin: 0 auto;"></div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 狗品种识别卡片
                const topBreedsHtml = data.top_breeds ? data.top_breeds.map((item, index) => {
                    // 品种名格式：中文名\n(英文名)，需要重新组合为一行显示
                    const breedLines = item.breed.split('\n');
                    const chineseName = breedLines[0];
                    const englishName = breedLines[1] ? breedLines[1].replace(/[()]/g, '') : '';
                    const rankColors = ['#FFD700', '#C0C0C0', '#CD7F32', '#FF6B6B', '#4ECDC4']; // 金银铜 + 其他颜色
                    const bgColor = rankColors[index] || '#6c757d';
                    return `
                        <div class="d-flex align-items-center justify-content-between mb-2 p-2 rounded" style="background: linear-gradient(135deg, ${bgColor}15, ${bgColor}08); border-left: 4px solid ${bgColor};">
                            <div class="flex-grow-1">
                                <div class="fw-bold text-dark mb-1">${index + 1}. ${chineseName}</div>
                                <div class="text-muted small">${englishName}</div>
                            </div>
                            <div class="badge fs-6" style="background-color: ${bgColor}; color: white; padding: 0.5em 0.8em;">
                                ${item.count}次
                            </div>
                        </div>
                    `;
                }).join('') : '<div class="text-muted text-center py-4">暂无数据</div>';

                html = `
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.total_count}</h5>
                                <p class="card-text">今日总识别次数</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.resnet_count}</h5>
                                <p class="card-text">ResNet今日使用</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.vgg_count}</h5>
                                <p class="card-text">VGG今日使用</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title">${data.mobilenet_count}</h5>
                                <p class="card-text">MobileNet今日使用</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 mt-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title">热门品种Top5</h6>
                                <div>${topBreedsHtml}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            cardsContainer.innerHTML = html;

            // 如果是猫狗分类，初始化饼图
            if (task === 'catdog' && data.cat_count + data.dog_count > 0) {
                setTimeout(() => {
                    const pieChart = echarts.init(document.getElementById('catdog-pie-chart'));
                    pieChart.setOption({
                        tooltip: { trigger: 'item' },
                        legend: { 
                            orient: 'horizontal', 
                            bottom: '5%',
                            textStyle: { fontSize: 12 }
                        },
                        series: [{
                            type: 'pie',
                            radius: ['40%', '70%'],
                            center: ['50%', '45%'],
                            data: [
                                { value: data.cat_count, name: '猫' },
                                { value: data.dog_count, name: '狗' }
                            ],
                            emphasis: { 
                                itemStyle: { 
                                    shadowBlur: 10, 
                                    shadowOffsetX: 0, 
                                    shadowColor: 'rgba(0, 0, 0, 0.5)' 
                                } 
                            },
                            label: {
                                formatter: '{b}: {c} ({d}%)'
                            }
                        }]
                    });
                }, 100);
            }
        }
        function loadPerformanceData(task) {
            const accChart = task === 'catdog' ? catdogAccuracyChart : breedsAccuracyChart;
            const timeChart = task === 'catdog' ? catdogTimeChart : breedsTimeChart;
            const sizeChart = task === 'catdog' ? catdogSizeChart : breedsSizeChart;
            const taskParam = task === 'catdog' ? 'catdog' : 'dogbreed';

            fetch(`/api/performance/?task=${taskParam}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error || Object.keys(data).length === 0) {
                        const message = '请在后台录入模型性能数据';
                        [accChart, timeChart, sizeChart].forEach(chart => {
                            chart.setOption({
                                title: { text: '暂无数据' },
                                graphic: { type: 'text', left: 'center', top: 'middle', style: { text: message, fontSize: 16 } }
                            });
                        });
                        return;
                    }

                    const models = ['resnet', 'vgg', 'mobilenet'];
                    const labels = { resnet: 'ResNet', vgg: 'VGG', mobilenet: 'MobileNet' };

                    accChart.setOption({
                        title: { text: '模型准确率对比' },
                        tooltip: { trigger: 'axis' },
                        xAxis: { type: 'category', data: models.map(m => labels[m]) },
                        yAxis: { type: 'value', name: '准确率 (%)' },
                        series: [{ type: 'bar', data: models.map(m => (data[m]?.accuracy || 0)), itemStyle: { color: '#5470c6' } }]
                    });

                    timeChart.setOption({
                        title: { text: '模型推理时间对比' },
                        tooltip: { trigger: 'axis' },
                        xAxis: { type: 'category', data: models.map(m => labels[m]) },
                        yAxis: { type: 'value', name: '时间 (ms)' },
                        series: [{ type: 'bar', data: models.map(m => (data[m]?.inference_time || 0)), itemStyle: { color: '#91cc75' } }]
                    });

                    sizeChart.setOption({
                        title: { text: '模型大小对比' },
                        tooltip: { trigger: 'axis' },
                        xAxis: { type: 'category', data: models.map(m => labels[m]) },
                        yAxis: { type: 'value', name: '模型大小 (MB)' },
                        series: [{ type: 'bar', data: models.map(m => (data[m]?.model_size || 0)), itemStyle: { color: '#fac858' } }]
                    });
                })
                .catch(error => console.error('加载性能数据失败:', error));
        }

        // 加载置信度统计数据
        function loadConfidenceData(task) {
            const overallChart = task === 'catdog' ? catdogConfOverallChart : breedsConfOverallChart;
            const classChart = task === 'catdog' ? catdogConfClassChart : breedsConfClassChart;
            const taskParam = task === 'catdog' ? 'catdog' : 'dogbreed';
            const isCatdog = task === 'catdog';

            fetch(`/api/confidence/overall/?task=${taskParam}`)
                .then(response => response.json())
                .then(overallData => {
                    if (overallData.error || Object.keys(overallData).length === 0) {
                        console.error('加载整体统计数据失败:', overallData.error);
                        // 显示无数据提示
                        overallChart.setOption({
                            title: { text: '暂无数据' },
                            graphic: {
                                type: 'text',
                                left: 'center',
                                top: 'middle',
                                style: { text: '请在后台录入置信度统计数据', fontSize: 16 }
                            }
                        });
                        classChart.setOption({
                            graphic: { type: 'text', left: 'center', top: 'middle', style: { text: '请在后台录入各类别置信度统计数据', fontSize: 16 } }
                        });
                        return;
                    }

                    const models = ['resnet', 'vgg', 'mobilenet'];
                    const modelLabels = { 'resnet': 'ResNet', 'vgg': 'VGG', 'mobilenet': 'MobileNet' };

                    // 模型整体平均置信度对比图表
                    overallChart.setOption({
                        title: { text: '模型整体平均置信度对比' },
                        tooltip: {
                            trigger: 'axis',
                            formatter: function(params) {
                                const item = params[0];
                                const model = models[item.dataIndex];
                                const confidence = overallData[model]?.avg_confidence || 0;
                                return `${modelLabels[model]}<br/>平均置信度: ${confidence}%`;
                            }
                        },
                        xAxis: { type: 'category', data: models.map(m => modelLabels[m]) },
                        yAxis: { type: 'value', name: '置信度 (%)' },
                        series: [{
                            name: '平均置信度',
                            type: 'bar',
                            data: models.map(m => overallData[m]?.avg_confidence || 0),
                            itemStyle: {
                                color: function(params) {
                                    const colors = ['#5470c6', '#91cc75', '#fac858'];
                                    return colors[params.dataIndex];
                                }
                            }
                        }]
                    });

                    // 整体平均置信度对比图表
                    overallChart.setOption({
                        title: { text: '模型整体平均置信度对比' },
                        tooltip: {
                            trigger: 'axis',
                            formatter: function(params) {
                                const item = params[0];
                                const model = models[item.dataIndex];
                                const confidence = overallData[model]?.avg_confidence || 0;
                                return `${modelLabels[model]}<br/>平均置信度: ${confidence}%`;
                            }
                        },
                        xAxis: { type: 'category', data: models.map(m => modelLabels[m]) },
                        yAxis: { type: 'value', name: '置信度 (%)' },
                        series: [{
                            type: 'bar',
                            data: models.map(m => overallData[m]?.avg_confidence || 0),
                            itemStyle: {
                                color: function(params) {
                                    const colors = ['#5470c6', '#91cc75', '#fac858'];
                                    return colors[params.dataIndex];
                                }
                            }
                        }]
                    });

                    // 加载各类别统计数据
                    fetch(`/api/confidence/byclass/?task=${taskParam}`)
                        .then(response => response.json())
                        .then(classData => {
                            if (classData.error || !classData.classes || classData.classes.length === 0) {
                                console.error('加载类别统计数据失败:', classData.error);
                                classChart.setOption({
                                    graphic: { type: 'text', left: 'center', top: 'middle', style: { text: '请在后台录入各类别置信度统计数据', fontSize: 16 } }
                                });
                                return;
                            }

                            // 各类别识别准确率分组柱状图
                            const series = models.map(model => ({
                                name: modelLabels[model],
                                type: 'bar',
                                data: classData.classes.map(cls => classData[model]?.[cls] || 0),
                                itemStyle: {
                                    color: model === 'resnet' ? '#5470c6' : model === 'vgg' ? '#91cc75' : '#fac858'
                                }
                            }));

                            // 存储原始数据用于排序筛选
                            if (!isCatdog) {
                                breedsClassData = classData;
                            }

                            updateBreedsClassChart(classData, isCatdog);
                        })
                        .catch(error => console.error('加载类别统计数据失败:', error));
                })
                .catch(error => console.error('加载整体统计数据失败:', error));
        }


        // Tab切换处理
        function handleTabSwitch(tabName) {
            currentTab = tabName;

            // 初始化对应Tab的图表（如果还未初始化）
            if (tabName === 'catdog' && !catdogChartsInitialized) {
                initCatdogCharts();
            } else if (tabName === 'breeds' && !breedsChartsInitialized) {
                initBreedsCharts();
            }

            // 延迟执行以确保Tab切换完成
            setTimeout(() => {
                resizeCharts(tabName);
                loadPerformanceData(tabName);
                loadConfidenceData(tabName);
                loadDailyStats(tabName);  // 加载实时数据
            }, 100);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化默认Tab（猫狗分类）的图表
            initCatdogCharts();
            loadPerformanceData('catdog');
            loadConfidenceData('catdog');
            loadDailyStats('catdog');  // 初始加载实时数据

            // Tab切换事件监听
            document.getElementById('catdog-tab').addEventListener('click', () => handleTabSwitch('catdog'));
            document.getElementById('breeds-tab').addEventListener('click', () => handleTabSwitch('breeds'));

            // 添加排序和筛选事件监听
            document.getElementById('breed-sort-select').addEventListener('change', () => {
                if (breedsClassData && currentTab === 'breeds') updateBreedsClassChart(breedsClassData, false);
            });
            document.getElementById('show-resnet').addEventListener('change', () => {
                if (breedsClassData && currentTab === 'breeds') updateBreedsClassChart(breedsClassData, false);
            });
            document.getElementById('show-vgg').addEventListener('change', () => {
                if (breedsClassData && currentTab === 'breeds') updateBreedsClassChart(breedsClassData, false);
            });
            document.getElementById('show-mobilenet').addEventListener('change', () => {
                if (breedsClassData && currentTab === 'breeds') updateBreedsClassChart(breedsClassData, false);
            });

            // 每30秒自动刷新当前Tab数据
            setInterval(() => {
                loadPerformanceData(currentTab);
                loadConfidenceData(currentTab);
                loadDailyStats(currentTab);  // 刷新实时数据
            }, 30000);
        });

        // 窗口大小改变时重新调整当前可见Tab的图表大小
        window.addEventListener('resize', function() {
            resizeCharts(currentTab);
        });
    </script>
</body>
</html>
